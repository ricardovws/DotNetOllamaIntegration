# BLOCO 1: Redirecionamento Mandatório
server {
    listen 80;
    server_name testezinho.site;

    # Retorna o código 301 (Movido Permanentemente) para a versăo HTTPS
    return 301 https://$host$request_uri;
}

# BLOCO 2: Configuraçăo HTTPS (Onde o trabalho acontece)
server {
    listen 443 ssl;
    server_name testezinho.site;

    ssl_certificate     /etc/letsencrypt/live/testezinho.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testezinho.site/privkey.pem;

    # Segurança Adicional (HSTS) - Força o uso de HTTPS por 1 ano
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass         http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming Config
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}